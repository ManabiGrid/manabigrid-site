<title>下に凸と上に凸——あるのは頂点の側だけ</title>
<desc>【この図の意図】定義域に制限がないとき、最大・最小は頂点の側だけに存在し、反対側は腕が開き続けて「なし」になることを2パネル対比で見せる。【主要な数値・設定】左: y=(x−2)²+3（最小3・最大なし）／右: y=−(x−3)²+5（最大5・最小なし）／腕の先に外向き矢印。【AIに同じ種類の図を描かせるときの説明文】「下に凸と上に凸——あるのは頂点の側だけ。定義域に制限がないとき、最大・最小は頂点の側だけに存在し、反対側は腕が開き続けて「なし」になることを2パネル対比で見せる。数値・設定: 左: y=(x−2)²+3（最小3・最大なし）／右: y=−(x−3)²+5（最大5・最小なし）／腕の先に外向き矢印。白黒印刷向けのシンプルな教材図（SVG）としてかいて。」——この説明文を生成AIに渡せば同型の図を描かせられる。数値を変えれば類題用の図も作れる。</desc>

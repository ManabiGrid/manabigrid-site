<title>四分位数を求める場合分けフローチャート</title>
<desc>L03主概念2の手順図。①小さい順に並べて個数を数える→②全体が偶数個なら前半・後半にきっちり半分ずつ（中央値は真ん中2つの平均）、奇数個ならど真ん中の1個＝中央値を除いて前半・後半に分ける→③各半分の中央値が第1・第3四分位数（半分が奇数個ならど真ん中の値・偶数個なら真ん中2つの平均）。この手順ロジック自体を本文の例1（9個）・例2（10個）に適用して答えが本文と一致することをassert検算済み。再現指示: 角丸の箱3つと左右分岐2箱を矢印でつなぎ、分岐ラベルを「偶数個」「奇数個」とする。数値は入れない。白黒のみ。</desc>

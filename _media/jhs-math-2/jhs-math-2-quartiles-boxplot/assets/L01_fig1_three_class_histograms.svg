<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 500" role="img">
<title>3クラスの家庭学習時間のヒストグラム（3枚縦並び）</title>
<desc>L01主概念1の導入図。3クラス各24人の家庭学習時間（架空の練習用データ）のヒストグラム3枚を縦に並べた。階級の幅は2時間・横軸0〜14時間・縦軸は度数。1組は山が中央、2組は山がやや右、3組は山が左で右すそが長い。形はそれぞれ分かるが、どのクラスが全体として長いのか一目では判断しにくい——複数集団の比較には情報の縮約（箱ひげ図）が要る、という必要性を体感させる。度数は生データから再集計してassert検算済み。同じ生データからL01の箱ひげ図（L01_fig2）も生成しており、2つの図は食い違わない。再現指示: 同じ横軸（0〜14・幅2）のヒストグラムを3段に描き、山の位置を中央・右寄り・左寄り（右すそ長）にする。棒は薄いグレー塗り＋黒枠。白黒のみ。</desc>

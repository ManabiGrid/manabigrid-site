<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img">
<title>二山分布のヒストグラムと箱ひげ図（箱ひげ図の限界）</title>
<desc>L06主概念3の限界体感図。横軸0〜30分を上下段で共通にし、上段に16人の通学時間のヒストグラム（階級幅5分・以上〜未満）、下段に同じデータの箱ひげ図を描いた。ヒストグラムは左（5〜10分に8人）と右（20〜25分に5人・25〜30分に3人）に山が2つあり、真ん中（10〜20分）は度数0。同じデータの箱ひげ図は7から24までの大きな箱に15.5の中央値線が入るだけで、二山の情報が見えない——五数への縮約で分布の形が失われることを対比で体感させる。五数・度数とも生データから再計算してassert検算済み（度数はQA修正後の値）。再現指示: 同じ横軸スケールの上段ヒストグラム＋下段箱ひげ図。二山の間の階級を空にする。白黒のみ。</desc>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 330" role="img">
<title>差し替え実験の箱ひげ図比較（35冊→12冊で箱は動かない）</title>
<desc>L04主概念1・2の実験の可視化図。同じ数直線（0〜36冊）にA（35冊の読書家あり）とB（その1人を12冊に差し替え）の箱ひげ図を上下に並べた。第1四分位数・中央値・第3四分位数の位置は2本で完全に同じ（破線ガイドで上下対応）で、右のひげの長さだけが激変する——範囲はかけ離れた値の影響を受けやすく、四分位範囲はほとんど受けない、という本文の実験を図で確かめる。両データの五数は生データから再計算し本文の表と一致をassert検算済み。再現指示: 同じ横軸に箱ひげ図2本を並べ、四分位数位置の不変を破線で、右ひげの短縮を矢印で示す。白黒のみ。</desc>

<desc>L01主概念2の初対面図。同じ数直線（0〜14時間）上に1組・2組・3組の箱ひげ図を縦に3本並べた。各図は左右にのびる線（ひげ）と中央の箱、箱の中の縦線からなる。1組にだけ5つの値の名前（最小値・第1四分位数・中央値・第3四分位数・最大値）を破線の引き出し線で注記した。数値のラベルは意図的に打たない（五数の読み取りは練習問題のため）。ヒストグラム図（L01_fig1）と同一の生データ各24人分から生成し、五数要約は教科書方式（中央値で前後半に分割・奇数個は中央値除外）で再計算して本文と一致をassert検算済み。再現指示: 同じ横軸の上に箱ひげ図を3本並べ、最上段の1本にだけ五数の名前を引き出し線で添える。数値ラベルなし。白黒のみ。</desc>

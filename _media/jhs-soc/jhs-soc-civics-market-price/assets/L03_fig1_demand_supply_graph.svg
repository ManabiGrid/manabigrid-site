<title>需要量・供給量の表をグラフにした図（みずき市場・架空データ）</title>
<desc>L03本文の図。横軸=量（個）・縦軸=1個の価格（円）の座標平面に、導入の架空調査表（価格ごとの買いたい量・売りたい量を並べた4行の表——どこかの価格で両者が等しくなる。それを探すのは本文の問い）の点を打ち、買いたい量（需要量）は実線と黒丸、売りたい量（供給量）は破線と白丸で結んだ。キャプションに「教科書などでは需要曲線・供給曲線と呼ばれる（扱いは社により異なる）」の慣用語注記を明記。2本の線が交わる価格のラベルは導入の問いの答えにあたるため付けない（線の交わり自体は表の見える化として残る）。再現指示: 目盛は表に出る値（価格60/80/100/120・量40/60/80/100）だけを打ち、2本の折れ線を実線+黒丸と破線+白丸で描き分け、線の名前は線のそばに直接ラベルする。白黒のみ。</desc>

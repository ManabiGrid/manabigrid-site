<title>架空プロフィールカードの実物図（Sora・代名詞欄つき）</title>
<desc>L03の教材カードの実物図。角丸のカード枠にヘッダ「プロフィールカード／※架空の人物」、記号的な人物アイコン（丸と肩の線のみ・顔は描かない）、名前 Sora、すること バスケットボール（放課後）、特技 絵を上手に描く、そして破線枠の「よぶとき（代名詞） she／her」欄を持つ。記載は本文のモデル紹介文（She plays basketball after school, and she draws pictures very well.）にある2事実のみで、本文にない属性は書かない。再現指示: 名刺型の角丸カードにラベル付きの行を並べ、最下段に代名詞欄を破線枠で設け、ヘッダ右に「※架空の人物」と明記する。人物の顔イラストは描かない。白黒のみ。</desc>

<title>話し手・聞き手・第三者の関係図（I / you / he・she）</title>
<desc>L03主概念1の関係図。左に向かい合う記号的な人物アイコン2つ（話し手＝I、聞き手＝you）、右に破線の人物アイコン（話し手でも聞き手でもない人＝he/she）。話し手の吹き出しに本文モデル文の一部 She plays basketball after school. を置き、文中の She が右の第三者を指すことを弧の矢印で示す。注意書きで「不在はルールの条件ではない（I でも you でもない人が he/she）」を明示（本文のつまずき防止注意と一致）。再現指示: 丸と肩の線だけの人物記号3つ（第三者のみ破線）と吹き出し1つを配置し、吹き出し内の主語から第三者へ矢印を引く。顔は描かない。白黒のみ。</desc>

<title>羅列版Aと接続版Bの読み比べ（接続語と足された情報に印）</title>
<desc>L02導入の対比図。上段A（羅列版）は6つの短文を1文ずつ別々の枠に並べて「文のリスト」であることを見せる。下段B（接続版）は同じ内容が接続語でつながった文章で、and / too / but / So に太い枠、足された情報（every Sunday / every night）に破線の下線を付けて差分を可視化する。A・Bとも本文スクリプトと一字一句一致することを生成時に検算済み。英文本文はL02のレッスン本文のスクリプトA・Bと同一（本文参照）。再現指示: 上下2パネルで、上は本文のスクリプトAを1文ずつ小箱に並べ、下は本文のスクリプトBを連続文で置いて接続語だけを太枠で囲み、追加情報に破線下線を引く。白黒のみ。</desc>

<desc>L08主概念1の過程図。左右2コマとも軸は−12〜12。左コマはx＝1〜12の6点（(1, 12)(2, 6)(3, 4)(4, 3)(6, 2)(12, 1)）だけを打った座標平面で、点がカーブ状にならぶ。右コマは間の点（(1.5, 8)(8, 1.5)・白丸）と負の側の6点を加え、滑らかな二本の曲線（右上と左下・多点サンプリング）で結んだ完成図（y＝12/xラベルつき）。(0.5, 24)や(24, 0.5)は軸範囲の外にあるため図中には打たない（E裁定）——曲線が枠の縁で切れることの説明に使う。全プロット点の積＝12と軸範囲内・範囲外の点の除外をassert検算済み。再現指示: 同じ軸の2コマ・右は曲線の端が枠の縁で切れ軸に触れない。白黒のみ。</desc>

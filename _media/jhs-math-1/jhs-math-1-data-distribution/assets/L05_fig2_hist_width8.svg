<title>的当てスコアのヒストグラム（階級幅8点・山が1つに見える）</title>
<desc>L05主概念1の後半図。図L05-1とまったく同じ40人のスコアを、階級幅8点で整理し直したヒストグラム。横軸0〜24点・縦軸度数。山が1つのふつうの分布に見え、幅2のときの2つの山の気配は消える——階級の幅が異なると読み取れる傾向が異なる場合があることの体感。度数は同じ生データから再集計し、幅2の表の合算とも一致することをassert検算済み。再現指示: 幅8の柱3本をすき間なく並べ、単峰の山に見える形にする。図L05-1と縦に並べて対比する用途。棒は薄いグレー塗り＋黒枠。白黒のみ。</desc>

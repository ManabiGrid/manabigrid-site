<desc>L02主概念1の実験図。横軸0〜100分の同じ目盛りの数直線2本に、上段は90分を入れた8人・下段は90分を除いた7人の練習時間（架空の練習用データ）をドットで打ち、それぞれの平均値（実線矢印）と中央値（破線矢印）の位置を示した。90分の1個が入ると平均値は10分から20分へ2倍にはね上がるのに、中央値は10分から10.5分とほとんど動かない——矢印の動き幅の差で外れ値の影響を可視化する。平均値・中央値は生データから再計算して本文と一致をassert検算済み。再現指示: 同じ目盛りの数直線2段にドットを打ち、平均値は上から実線矢印・中央値は下から破線矢印で指す。白黒のみ。</desc>

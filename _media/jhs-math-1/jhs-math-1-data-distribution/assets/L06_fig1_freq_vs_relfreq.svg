<title>度数の柱と相対度数の柱の並置比較図（1年生40人と2年生25人）</title>
<desc>L06主概念2の可視化図。けん玉チャレンジの1年生40人（グレー塗り）と2年生25人（斜線）を、上段は度数の柱・下段は相対度数の柱で、同じ横軸（成功回数0〜20回・階級幅4回）に並べた。上段ではほぼ全階級で1年生の柱が高いが、下段では2つの階級で2年生が上回る逆転が起きる（▲印）——総度数が違うと度数のままではフェアに比べられないことの可視化。相対度数は度数÷総度数で再計算して本文の表と一致をassert検算済み（合計1.00の検算つき）。再現指示: 同じ横軸の2段構成で、上段=度数・下段=相対度数のグループ棒グラフを描き、逆転する階級に印を付ける。白黒のみ（塗りと斜線パターンで2集団を区別）。</desc>

<title>分布の形と代表値の並びの3型比較図（対称・右裾・左裾）</title>
<desc>L04主概念3の一覧整理図。数値なしの滑らかな山型の模式図3枚を横に並べ、①左右対称では平均値・中央値・最頻値の3つが中央でほぼ一致、②右に裾を引く形では最頻値＜中央値＜平均値の順に右へ、③左に裾を引く形では平均値＜中央値＜最頻値の順に左へ並びやすいことを、縦線（最頻値=実線・中央値=破線・平均値=点線）で示した。3本の縦線の位置は、描いた密度曲線そのものから平均値・中央値・最頻値を数値計算して決めており、並び順が分布の性質から出ることをassert検算済み（「なりやすい」であって必ずではない点は本文guideのとおり）。再現指示: 山型曲線3枚に、線種を変えた縦線3本（対称のみ1本に重なる）を立て、凡例を添える。白黒のみ。</desc>

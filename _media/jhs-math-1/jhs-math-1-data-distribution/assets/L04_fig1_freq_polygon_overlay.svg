<title>ヒストグラムと度数折れ線の重ね図（通学時間・階級幅5分）</title>
<desc>L04主概念2の作図手順図。L03と同一の通学時間30人のヒストグラム（階級幅5分・薄いグレーの柱）に、各柱の上の辺の真ん中（階級値の位置）を順に線分で結んだ度数折れ線を濃い実線で重ねた。両端は、両どなりに度数0の階級があるものとしてその階級値の位置で横軸に降りる。折れ線だけ残せば分布の山の稜線になる。度数は生データから再集計して本文の表と一致をassert検算済み。最頻値・中央値・平均値の位置は描かない（主概念3で求める活動のため）。再現指示: ヒストグラムの各柱の頂上中央に点を打ち、隣どうしを太めの実線で結び、両端を横軸に降ろす。白黒のみ。</desc>

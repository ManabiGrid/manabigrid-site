<title>通学時間のヒストグラム（階級幅5分・表と柱の1対1対応つき)</title>
<desc>L03主概念2の初対面図。上に階級幅5分の度数分布表（8階級・合計30人）を柱と同じ列位置で横向きに置き、下にそのヒストグラム（横軸0〜40分・縦軸度数）を描いて、表の各マスから対応する柱へまっすぐ下向きの灰色矢印を1本ずつ引き、「表の1階級=柱1本・柱の高さ=度数」の対応を示した。山は1つで頂上は度数9の階級、右へなだらかに裾を引く形。度数は30個の生データから再集計して本文の表と一致をassert検算済み。柱はすき間なく並べる。再現指示: 上に横向きの度数分布表・下にヒストグラムを列をそろえて置き、各マスから柱へ垂直の細い矢印を引く。棒は薄いグレー塗り＋黒枠。白黒のみ。</desc>

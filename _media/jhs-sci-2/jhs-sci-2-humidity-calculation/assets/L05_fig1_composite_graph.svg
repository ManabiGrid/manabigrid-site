<title>図1 複合グラフ——飽和水蒸気量の曲線と水蒸気量の棒（架空の練習用データ）</title>
<desc>L05の図1（本文の文字ベース模式図を正確な縮尺で正式化したグラフ）。横軸=気温0〜30℃（5℃刻み・等間隔）、縦軸=g/m³（0〜32・4刻み・等間隔の線形縮尺）。曲線は架空の練習用数表の7点（0℃4.0／5℃6.0／10℃8.0／15℃12.0／20℃16.0／25℃24.0／30℃32.0）を厳密に通る単調増加曲線で、各点に●マーカー。棒は空気P（気温25℃の位置・高さ12.0g/m³・斜線45°）と空気Q（気温15℃の位置・高さ6.0g/m³・斜線135°）。凡例で「曲線＝上限／棒＝実際に含む水蒸気量」を明示し、「架空の練習用データ」を図中に大きく明示する。P・Qの湿度や露点の数値は入れない（練習問題の答えのため）。再現指示: 線形の座標平面に架空数表7点を通る滑らかな単調増加曲線と●を描き、指定の2本のハッチング棒を立て、凡例と架空データの断りを添える。白黒のみ。</desc>

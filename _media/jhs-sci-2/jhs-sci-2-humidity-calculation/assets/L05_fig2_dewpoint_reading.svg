<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 404" role="img">
<title>露点の読み取り図——棒の上端から水平にたどって曲線と交わる点</title>
<desc>L05例題2の読み取り手順図。図1と同じ座標平面（横軸=気温0〜30℃・縦軸=g/m³ 0〜32・正確な線形縮尺）に、空気Pの棒（気温25℃・高さ12.0g/m³）と架空数表7点を通る飽和水蒸気量の曲線を描き、①棒の上端から水平に左へ破線矢印、②曲線と交わる点を二重丸で強調、③交点から真下へ破線矢印＝露点、の3ステップを示す。交点は表の点（15℃, 12.0）と厳密に一致する（例題2で解き済みの例示）。空気Qの読み取り線は練習問題の答えにあたるため描かない。再現指示: 複合グラフの上に、棒の上端→水平破線矢印→曲線との交点（二重丸）→垂直破線矢印→横軸、の読み取り経路と手順①②③のラベルを重ねる。白黒のみ。</desc>

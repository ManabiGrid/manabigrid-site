<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 256" role="img">
<title>変換候補を選ぶ二段構え——「きこう」の候補窓と検算フロー</title>
<desc>L03主概念1・2の図。左は端末の変換候補窓のイメージで、入力「きこう」に対して気候（その土地の天気のようす）・機構（組織・しくみ）・紀行（旅の記録）・寄港（船が港に立ち寄ること）の4候補と語義メモが並ぶ。右は選び方のフロー「文脈で仮に決める→語義・辞書で検算する（太枠で強調）→確定」。図にはあえて例文を置かず「どれを選ぶかは文脈がなければ決められない」と添えることで、特定の候補を正解として示さない。題材の「きこう」は本単元の設問・導入に出ない音を選んであり、設問（かんしん・いがい・たいしょう等）の答えに触れない。同型図の描き方: 左に入力欄と4行の候補窓（番号＋表記＋語義メモ）、右に縦3段のフロー（2段目を太枠）を描き、下に例文を置かない旨のキャプション。白黒のみ。</desc>

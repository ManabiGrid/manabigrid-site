<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img">
<title>同訓異字の使い分けマップ——「はかる」（測・計・量）の場面分岐</title>
<desc>L01主概念1の見取り図。上の箱「『はかる』と書きたい」から「文の意味は？」で3つに分岐し、長さ・深さ・広さなど→「測」と書くことが多い／時間・数など→「計」と書くことが多い／重さ・体積（かさ）など→「量」と書くことが多い、と場面ごとの傾向を示す。下の破線枠に「この使い分けは目安であって、絶対の規則ではない。候補はほかにもある（図・諮など）。決めきれないときは辞書で確かめる」という留保を明記（文化審議会の異字同訓の使い分け例が『慣用上の大体』とされることに対応）。題材の「はかる」は本単元の設問で使われていない訓を意図的に選び、設問の答えを確定させない。同型図の描き方: 上に開始の箱、中央に問いのラベル、下に3つの箱（場面カテゴリ＋大きな見出し字＋「と書くことが多い」）を並べて矢印でつなぎ、最下部に破線枠の留保注記を置く。白黒のみ・断定表現禁止。</desc>
